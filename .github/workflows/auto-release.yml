name: Auto Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Chromium
        id: setupchrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        with:
          chrome-version: stable

      - name: Install fonts and artifact inspectors
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra poppler-utils

      - name: Install verified mdpress 0.7.10
        env:
          MDPRESS_VERSION: "0.7.10"
          MDPRESS_SHA256: "17e53e455996940bbbce64c69c43b3fb543f1501e03b74cf0434074efebd2db4"
        run: |
          archive="/tmp/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz"
          curl -fsSL "https://github.com/yeasy/mdPress/releases/download/v${MDPRESS_VERSION}/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz" -o "$archive"
          echo "${MDPRESS_SHA256}  $archive" | sha256sum -c -
          tar xzf "$archive" -C /tmp mdpress
          sudo mv /tmp/mdpress /usr/local/bin/mdpress
          mdpress --version

      - name: Install verified Pandoc 3.5
        env:
          PANDOC_VERSION: "3.5"
          PANDOC_SHA256: "4f41d817d262ef3d17953a3e6e0fefddb971aa4f2f121544a9a86db449d945e1"
        run: |
          curl -fsSL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb" -o /tmp/pandoc.deb
          echo "${PANDOC_SHA256}  /tmp/pandoc.deb" | sha256sum -c -
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version | head -1

      - name: Install locked publication dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: |
          python3 -m pip install --disable-pip-version-check -r requirements-docx.txt
          npm ci --prefix tools/mermaid --ignore-scripts
          echo "$GITHUB_WORKSPACE/tools/mermaid/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run project checks
        run: |
          python3 check_project_rules.py
          python3 -m unittest discover -s tests -v

      - name: Extract safe tag name
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag_name="${GITHUB_REF#refs/tags/}"
          else
            tag_name="manual"
          fi
          safe_tag_name=$(printf '%s' "$tag_name" | sed 's/[^A-Za-z0-9._-]/-/g')
          safe_tag_name="${safe_tag_name:-latest}"
          echo "TAG_NAME=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "SAFE_TAG_NAME=${safe_tag_name}" >> "$GITHUB_OUTPUT"

      - name: Build publication bundle
        env:
          CHROME_BIN: ${{ steps.setupchrome.outputs.chrome-path }}
        run: |
          mkdir -p dist
          TAG_NAME="${{ steps.tag.outputs.SAFE_TAG_NAME }}"
          (
            cd cn
            mdpress build --format pdf --output "../dist/learning_pickleball-${TAG_NAME}-cn.pdf"
          )
          (
            cd en
            mdpress build --format pdf --output "../dist/learning_pickleball-${TAG_NAME}-en.pdf"
          )
          python3 tools/build_docx.py --output-dir dist
          TITLE=$(python3 -c "import json; print(json.load(open('book.json')).get('title') or '${{ github.event.repository.name }}')")
          python3 tools/render_mermaid.py --book-dir . --svg-out /tmp/mmsvg
          python3 tools/build_html_reader.py --book-dir . --title "$TITLE" --svg-dir /tmp/mmsvg \
            --out "dist/${{ github.event.repository.name }}-${TAG_NAME}.html"

      - name: Smoke test artifacts and write checksums
        run: |
          for pdf in dist/*.pdf; do
            test -s "$pdf"
            pdfinfo "$pdf" >/dev/null
          done
          python3 - <<'PY'
          from pathlib import Path
          import zipfile
          for path in sorted(Path("dist").glob("*.docx")):
              if not zipfile.is_zipfile(path):
                  raise SystemExit(f"invalid DOCX ZIP: {path}")
              with zipfile.ZipFile(path) as archive:
                  bad = archive.testzip()
                  if bad:
                      raise SystemExit(f"corrupt DOCX member: {path}:{bad}")
          PY
          html=$(find dist -maxdepth 1 -name '*.html' -print -quit)
          test -n "$html"
          test -s "$html"
          grep -qi "<!doctype html" "$html"
          (
            cd dist
            sha256sum -- *.pdf *.docx *.html > SHA256SUMS
            sha256sum -c SHA256SUMS
          )

      - name: Create release with verified bundle
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          files: dist/*

      - name: Upload verified publication bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: learning-pickleball-publication
          path: dist/
          if-no-files-found: error
