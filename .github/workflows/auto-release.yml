name: Auto Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Chromium and CJK fonts
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra

      - name: Install mdpress 0.7.10
        env:
          MDPRESS_VERSION: "0.7.10"
          MDPRESS_SHA256: "17e53e455996940bbbce64c69c43b3fb543f1501e03b74cf0434074efebd2db4"
        run: |
          archive="/tmp/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz"
          echo "Installing mdpress ${MDPRESS_VERSION}"
          curl -fsSL "https://github.com/yeasy/mdPress/releases/download/v${MDPRESS_VERSION}/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz" -o "$archive"
          echo "${MDPRESS_SHA256}  $archive" | sha256sum -c -
          tar xzf "$archive"
          sudo mv mdpress /usr/local/bin/
          mdpress --version

      - name: Extract tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build PDFs
        run: |
          TAG_NAME="${{ steps.tag.outputs.TAG_NAME }}"
          if [ "${{ github.ref_type }}" != "tag" ]; then
            TAG_NAME="manual"
          fi
          (
            cd cn
            mdpress build --format pdf --output ../learning_pickleball-${TAG_NAME}-cn.pdf
          )
          (
            cd en
            mdpress build --format pdf --output ../learning_pickleball-${TAG_NAME}-en.pdf
          )
          test -s "learning_pickleball-${TAG_NAME}-cn.pdf"
          test -s "learning_pickleball-${TAG_NAME}-en.pdf"

      - name: Create Release with PDFs
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            learning_pickleball-${{ steps.tag.outputs.TAG_NAME }}-cn.pdf
            learning_pickleball-${{ steps.tag.outputs.TAG_NAME }}-en.pdf

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v7
        with:
          name: learning_pickleball-pdf
          path: "learning_pickleball-*.pdf"
