name: Update Preview PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: preview-pdf
  cancel-in-progress: true

jobs:
  build:
    name: Build and verify preview PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Check project rules
        run: python3 check_project_rules.py

      - name: Install Chromium
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        with:
          chrome-version: stable

      - name: Install fonts and PDF inspector
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra poppler-utils

      - name: Resolve latest mdPress release
        run: |
          url="$(curl -fsSL --retry 3 -o /dev/null -w '%{url_effective}' https://github.com/yeasy/mdPress/releases/latest)"
          version="${url##*/v}"
          test -n "$version" || { echo "could not resolve latest mdPress release"; exit 1; }
          echo "MDPRESS_VERSION=$version" >> "$GITHUB_ENV"
          echo "resolved mdPress $version"
      - name: Install mdPress (checksum-verified)
        run: |
          archive="/tmp/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz"
          curl -fsSL "https://github.com/yeasy/mdPress/releases/download/v${MDPRESS_VERSION}/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz" -o "$archive"
          expected="$(curl -fsSL --retry 3 "https://github.com/yeasy/mdPress/releases/download/v${MDPRESS_VERSION}/checksums.txt" \
            | awk -v f="mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz" '$2==f {print $1}')"
          test -n "$expected" || { echo "no published checksum for mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz"; exit 1; }
          echo "${expected}  $archive" | sha256sum -c -
          tar xzf "$archive" -C /tmp mdpress
          sudo mv /tmp/mdpress /usr/local/bin/mdpress
          mdpress --version

      - name: Build latest preview PDFs
        run: |
          # mdPress PDF generation drives headless Chrome, which intermittently dies with
          # "websocket url timeout reached" + dbus errors. Retry the build, not the whole job.
          mdpress() { local a; for a in 1 2 3; do command mdpress "$@" && return 0;
            echo "::warning::mdpress attempt $a failed; retrying in 10s"; sleep 10; done; return 1; }
          mkdir -p dist
          (
            cd cn
            mdpress build --format pdf --output ../dist/learning_pickleball-cn.pdf
          )
          (
            cd en
            mdpress build --format pdf --output ../dist/learning_pickleball-en.pdf
          )

      - name: Write release notes
        run: |
          cat > dist/release-notes.md <<EOF
          Auto-updated preview PDFs from \`${GITHUB_SHA::7}\`.

          - Branch: \`${GITHUB_REF_NAME}\`
          - Commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          - Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

      - name: Validate preview content and write checksums
        run: |
          python3 tools/validate_publication_artifacts.py --dist dist
          (
            cd dist
            sha256sum -- *.pdf > SHA256SUMS
            sha256sum -c SHA256SUMS
          )

      - name: Upload verified preview bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: learning-pickleball-preview-bundle
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish verified preview PDFs
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download verified preview bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: learning-pickleball-preview-bundle
          path: dist

      - name: Reverify preview bundle checksums
        run: |
          cd dist
          sha256sum -c SHA256SUMS

      - name: Synchronize mutable preview tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REPOSITORY" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid GITHUB_REPOSITORY: $GITHUB_REPOSITORY" >&2
            exit 1
          fi
          if [[ ! "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid GITHUB_SHA" >&2
            exit 1
          fi

          probe_dir=$(mktemp -d)
          trap 'rm -rf "$probe_dir"' EXIT
          set +e
          gh api --include --method GET \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/preview-pdf" \
            >"$probe_dir/response" 2>"$probe_dir/error"
          probe_rc=$?
          set -e
          http_status=$(awk '$1 ~ /^HTTP\// && $2 ~ /^[0-9][0-9][0-9]$/ { status=$2 } END { print status }' "$probe_dir/response")

          if [[ $probe_rc -eq 0 && "$http_status" == "200" ]]; then
            gh api --silent --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/tags/preview-pdf" \
              --raw-field sha="$GITHUB_SHA" \
              --field force=true
          elif [[ $probe_rc -ne 0 && "$http_status" == "404" ]]; then
            gh api --silent --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              --raw-field ref="refs/tags/preview-pdf" \
              --raw-field sha="$GITHUB_SHA"
          else
            cat "$probe_dir/response" >&2
            cat "$probe_dir/error" >&2
            echo "Preview tag lookup failed (exit=$probe_rc, HTTP=${http_status:-unavailable}); refusing to mutate refs or releases." >&2
            exit 1
          fi

      - name: Create or update preview release
        shell: bash
        run: |
          set -euo pipefail
          error_file=$(mktemp)
          trap 'rm -f "$error_file"' EXIT
          set +e
          gh release view preview-pdf >/dev/null 2>"$error_file"
          release_rc=$?
          set -e

          if [[ $release_rc -eq 0 ]]; then
            gh release edit preview-pdf \
              --title "Latest Preview PDFs" \
              --notes-file dist/release-notes.md \
              --prerelease
          elif [[ "$(tr -d '\r' < "$error_file")" == "release not found" ]]; then
            gh release create preview-pdf \
              --title "Latest Preview PDFs" \
              --notes-file dist/release-notes.md \
              --prerelease \
              --latest=false \
              --verify-tag
          else
            cat "$error_file" >&2
            echo "Preview release lookup failed (exit=$release_rc); refusing to create or edit the release." >&2
            exit 1
          fi

      - name: Remove legacy preview assets when present
        run: |
          assets=$(gh release view preview-pdf --json assets --jq '.assets[].name')
          for asset in latest-cn.pdf latest-en.pdf; do
            if grep -Fxq "$asset" <<<"$assets"; then
              gh release delete-asset preview-pdf "$asset" -y
            fi
          done

      - name: Upload verified preview PDFs
        run: |
          gh release upload preview-pdf \
            dist/learning_pickleball-cn.pdf \
            dist/learning_pickleball-en.pdf \
            dist/SHA256SUMS \
            --clobber
